services:
  qbittorrent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cyber-seed-qbt
    environment:
      # Linux user/group IDs — run `id` on host to get yours
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      # qBittorrent Web UI port (inside container is always 8080)
      - WEBUI_PORT=8080
      # rclone config path (inside container)
      - RCLONE_CONFIG=/config/rclone/rclone.conf
      # OneDrive remote name (set during setup.sh)
      - ONEDRIVE_REMOTE=${ONEDRIVE_REMOTE:-onedrive}
      # Target path on OneDrive/SharePoint
      - ONEDRIVE_PATH=${ONEDRIVE_PATH:-/Torrents}
      # Target folder for web/URL downloads (separate from torrents)
      - WEBDL_PATH=${WEBDL_PATH:-/WebDownloads}
      # qBittorrent Web UI password (set during setup.sh, hashed by init-qbt.sh)
      - QBT_WEBUI_PASS=${QBT_WEBUI_PASS:-}
    volumes:
      # qBittorrent config (persisted on host)
      - ./config/qbittorrent:/config
      # rclone config (persisted on host, separate for easy backup)
      - ./config/rclone:/config/rclone
      # Downloads: incomplete + completed folders
      - ${DOWNLOADS_PATH:-./downloads}:/downloads
      # Scripts directory (directory mount avoids git inode-replacement issues)
      - ./scripts:/scripts:ro
      # Custom init script to inject qBittorrent AutoRun settings
      - ./scripts/init-qbt.sh:/custom-cont-init.d/99-init-qbt.sh:ro
      # Browser download watcher — launched via cont-init.d (lsio s6-overlay v3)
      - ./scripts/browser-upload-watcher.sh:/scripts/browser-upload-watcher.sh:ro
      - ./scripts/browser-watcher-launch.sh:/custom-cont-init.d/98-browser-watcher.sh:ro
      # Upload logs
      - ./logs:/logs
    ports:
      # Web UI
      - "${WEBUI_PORT:-8080}:8080"
      # Torrent traffic (TCP + UDP)
      - "${TORRENT_PORT:-6881}:6881"
      - "${TORRENT_PORT:-6881}:6881/udp"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── System monitor ─────────────────────────────────────────────────
  # Shows disk usage, CPU, RAM, network in a clean web UI
  glances:
    image: nicolargo/glances:latest-full
    container_name: cyber-seed-monitor
    restart: unless-stopped
    pid: host          # needed to see host processes
    privileged: true   # needed to read host disk/network stats
    environment:
      - GLANCES_OPT=-w --password  # web server mode with password
      - TZ=${TZ:-UTC}
    volumes:
      # Pre-generated password file (avoids interactive prompt)
      - ./glances-config/glances.pwd:/root/.config/glances/glances.pwd:ro
      # Read-only host filesystem mounts so Glances sees real disk stats
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/rootfs:ro
      - /sys:/sys:ro
      - /proc:/proc:ro
    ports:
      - "${MONITOR_PORT:-61208}:61208"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:61208/api/4/cpu || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Web UI (URL dispatcher) ─────────────────────────────────────────
  # Accepts URL submissions, dispatches to qbt container, streams progress
  webui:
    build:
      context: ./webui
      dockerfile: Dockerfile
    container_name: cyber-seed-webui
    restart: unless-stopped
    environment:
      - QBT_CONTAINER=cyber-seed-qbt
      - QBT_WEBUI_PASS=${QBT_WEBUI_PASS:-}
      - TZ=${TZ:-UTC}
    volumes:
      # Docker socket to run exec in sibling containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared logs directory so job logs are visible
      - ./logs:/logs
      # Downloads directory for file manager
      - ${DOWNLOADS_PATH:-./downloads}:/downloads:ro
    ports:
      - "${DOWNLOADER_PORT:-8888}:8888"
    depends_on:
      - qbittorrent

  # ── File Browser ──────────────────────────────────────────────────────
  # Web-based file manager for /downloads — move, rename, delete, download files
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: cyber-seed-files
    restart: unless-stopped
    user: "0:0"
    volumes:
      - ${DOWNLOADS_PATH:-./downloads}:/srv
      - filebrowser_data:/database
    ports:
      - "${FILEBROWSER_PORT:-8334}:80"
    command: >
      --noauth
      --root=/srv
      --database=/database/filebrowser.db

  # ── Virtual Browser (Chromium) ──────────────────────────────────────
  # Full Chromium browser via noVNC — browse manually & use Video DownloadHelper
  # to save videos directly to /downloads/browser → auto-uploaded to OneDrive.
  # First-time setup: in the browser go to chrome://settings/downloads
  # and set the download location to /downloads/browser
  browser:
    image: jlesage/chromium
    container_name: cyber-seed-browser
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined   # required for Chromium sandboxing
    environment:
      - USER_ID=${PUID:-1000}
      - GROUP_ID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - DISPLAY_WIDTH=1280
      - DISPLAY_HEIGHT=720
      - KEEP_APP_RUNNING=1    # restart Chromium if it crashes
    volumes:
      - ${DOWNLOADS_PATH:-./downloads}:/downloads
      - ./config/browser:/config
      - ./extension:/opt/cyberseed-extension:ro
    ports:
      - "${BROWSER_PORT:-3456}:5800"
    shm_size: "1gb"

volumes:
  filebrowser_data:
