services:
  qbittorrent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cyber-seed-qbt
    environment:
      # Linux user/group IDs — run `id` on host to get yours
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      # qBittorrent Web UI port (inside container is always 8080)
      - WEBUI_PORT=8080
      # rclone config path (inside container)
      - RCLONE_CONFIG=/config/rclone/rclone.conf
      # OneDrive remote name (set during setup.sh)
      - ONEDRIVE_REMOTE=${ONEDRIVE_REMOTE:-onedrive}
      # Target path on OneDrive/SharePoint
      - ONEDRIVE_PATH=${ONEDRIVE_PATH:-/Torrents}
      # Target folder for web/URL downloads (separate from torrents)
      - WEBDL_PATH=${WEBDL_PATH:-/WebDownloads}
      # qBittorrent Web UI password (set during setup.sh, hashed by init-qbt.sh)
      - QBT_WEBUI_PASS=${QBT_WEBUI_PASS:-}
    volumes:
      # qBittorrent config (persisted on host)
      - ./config/qbittorrent:/config
      # rclone config (persisted on host, separate for easy backup)
      - ./config/rclone:/config/rclone
      # Downloads: incomplete + completed folders
      - ${DOWNLOADS_PATH:-./downloads}:/downloads
      # Scripts directory (directory mount avoids git inode-replacement issues)
      - ./scripts:/scripts:ro
      # Custom init script to inject qBittorrent AutoRun settings
      - ./scripts/init-qbt.sh:/custom-cont-init.d/99-init-qbt.sh:ro
      # Browser download watcher (s6 long-running service)
      - ./scripts/browser-upload-watcher.sh:/custom-services.d/browser-watcher/run:ro
      # Upload logs
      - ./logs:/logs
    ports:
      # Web UI
      - "${WEBUI_PORT:-8080}:8080"
      # Torrent traffic (TCP + UDP)
      - "${TORRENT_PORT:-6881}:6881"
      - "${TORRENT_PORT:-6881}:6881/udp"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── System monitor ─────────────────────────────────────────────────
  # Shows disk usage, CPU, RAM, network in a clean web UI
  glances:
    image: nicolargo/glances:latest-full
    container_name: cyber-seed-monitor
    restart: unless-stopped
    pid: host          # needed to see host processes
    privileged: true   # needed to read host disk/network stats
    environment:
      - GLANCES_OPT=-w  # web server mode, no password
      - TZ=${TZ:-UTC}
    volumes:
      # Read-only host filesystem mounts so Glances sees real disk stats
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /:/rootfs:ro
      - /sys:/sys:ro
      - /proc:/proc:ro
    ports:
      - "${MONITOR_PORT:-61208}:61208"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:61208/api/4/cpu || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Web UI (URL dispatcher) ─────────────────────────────────────────
  # Accepts URL submissions, dispatches to qbt container, streams progress
  webui:
    build:
      context: ./webui
      dockerfile: Dockerfile
    container_name: cyber-seed-webui
    restart: unless-stopped
    environment:
      - QBT_CONTAINER=cyber-seed-qbt
      - QBT_WEBUI_PASS=${QBT_WEBUI_PASS:-}
      - TZ=${TZ:-UTC}
    volumes:
      # Docker socket to run exec in sibling containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared logs directory so job logs are visible
      - ./logs:/logs
      # Downloads directory for file manager
      - ${DOWNLOADS_PATH:-./downloads}:/downloads:ro
    ports:
      - "${DOWNLOADER_PORT:-8888}:8888"
    depends_on:
      - qbittorrent

  # ── Virtual Browser (Chromium) ──────────────────────────────────────
  # Full Chromium browser accessible via web, downloads go to /downloads
  browser:
    image: lscr.io/linuxserver/chromium:latest
    container_name: cyber-seed-browser
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined   # required for Chromium sandboxing
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - CHROME_CLI=https://www.google.com
      - CUSTOM_USER=${BROWSER_USER:-admin}
      - PASSWORD=${QBT_WEBUI_PASS:-password}
    volumes:
      - ${DOWNLOADS_PATH:-./downloads}:/downloads
      - ./config/browser:/config
      - ./config/browser-policies:/etc/chromium/policies
    ports:
      - "${BROWSER_PORT:-3456}:3000"
    shm_size: "1gb"
