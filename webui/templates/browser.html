<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberSeed — Browser</title>
  <!-- browser.html: browser upload job monitor -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #c9d1d9; font-family: 'Cascadia Code','Fira Code',monospace; display: flex; flex-direction: column; height: 100vh; }
    .toolbar { background: #161b22; border-bottom: 1px solid #30363d; padding: .35rem .8rem; display: flex; gap: .5rem; align-items: center; flex-shrink: 0; }
    .toolbar a, .toolbar button { font-size: .75rem; padding: .2rem .5rem; border-radius: 4px; text-decoration: none; border: 1px solid #30363d; background: transparent; color: #8b949e; cursor: pointer; white-space: nowrap; }
    .toolbar a:hover, .toolbar button:hover { color: #c9d1d9; border-color: #8b949e; }
    .toolbar .brand { color: #0dcaf0; font-weight: 700; letter-spacing: 2px; border: none; font-size: .85rem; }
    .toolbar .active-page { color: #ffc107; border: none; font-size: .8rem; }
    .toolbar .spacer { flex: 1; }
    .open-btn { background: #238636 !important; color: #fff !important; border-color: #238636 !important; }
    .open-btn:hover { background: #2ea043 !important; border-color: #2ea043 !important; }
    .layout { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .panel-header { padding: .6rem 1rem; background: #161b22; border-bottom: 1px solid #21262d; font-size: .72rem; color: #8b949e; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; justify-content: space-between; }
    .panel-header span { color: #0dcaf0; font-weight: 700; }
    .panel-header button { font-size: .68rem; background: transparent; border: 1px solid #30363d; color: #8b949e; padding: .15rem .5rem; border-radius: 3px; cursor: pointer; }
    .panel-header button:hover { color: #c9d1d9; border-color: #8b949e; }
    .jobs-list { flex: 1; overflow-y: auto; padding: .75rem 1rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); align-content: start; gap: .5rem; }
    .job-card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: .6rem .8rem; cursor: pointer; transition: border-color .15s; }
    .job-card:hover { border-color: #8b949e; }
    .job-card.selected { border-color: #0dcaf0; }
    .job-name { font-size: .75rem; color: #c9d1d9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: .25rem; }
    .job-meta { font-size: .68rem; color: #8b949e; display: flex; gap: .6rem; align-items: center; }
    .badge { padding: .1rem .4rem; border-radius: 3px; font-size: .65rem; font-weight: 700; text-transform: uppercase; }
    .badge-running { background: #1f4068; color: #58a6ff; }
    .badge-done    { background: #1a3a2a; color: #3fb950; }
    .badge-failed  { background: #3d1a1a; color: #f85149; }
    .badge-queued  { background: #2d2a1a; color: #d29922; }
    .log-pane { height: 260px; border-top: 1px solid #21262d; display: flex; flex-direction: column; flex-shrink: 0; }
    .log-pane-header { padding: .35rem 1rem; font-size: .68rem; color: #8b949e; background: #161b22; border-bottom: 1px solid #21262d; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-content { flex: 1; overflow-y: auto; padding: .5rem 1rem; font-size: .68rem; line-height: 1.6; white-space: pre-wrap; word-break: break-all; color: #8b949e; }
    .log-content .ok  { color: #3fb950; }
    .log-content .err { color: #f85149; }
    .empty-state { grid-column: 1 / -1; text-align: center; padding: 3rem; font-size: .8rem; color: #444; line-height: 1.8; }
    .empty-state a { color: #0dcaf0; }
    /* FapHouse queue section */
    .fh-section { border-bottom: 1px solid #21262d; padding: .75rem 1rem; background: #0d1117; flex-shrink: 0; }
    .fh-section h3 { font-size: .72rem; color: #0dcaf0; letter-spacing: 1px; text-transform: uppercase; margin-bottom: .5rem; }
    .fh-row { display: flex; gap: .5rem; align-items: flex-start; }
    .fh-row textarea { flex: 1; background: #161b22; border: 1px solid #30363d; color: #c9d1d9; border-radius: 4px; padding: .5rem; font-size: .72rem; font-family: inherit; resize: vertical; min-height: 60px; max-height: 140px; }
    .fh-row textarea:focus { outline: none; border-color: #0dcaf0; }
    .fh-row textarea::placeholder { color: #484f58; }
    .fh-btn { background: #8957e5; color: #fff; border: none; padding: .5rem 1rem; border-radius: 4px; font-size: .72rem; font-family: inherit; cursor: pointer; white-space: nowrap; }
    .fh-btn:hover:not(:disabled) { background: #a371f7; }
    .fh-btn:disabled { opacity: .45; cursor: default; }
    .fh-queue-bar { margin-top: .5rem; display: flex; gap: .4rem; flex-wrap: wrap; }
    .fh-pill { font-size: .62rem; padding: .15rem .5rem; border-radius: 10px; border: 1px solid #30363d; color: #8b949e; background: #161b22; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px; }
    .fh-pill.pending { border-color: #d29922; color: #d29922; }
    .fh-pill.processing { border-color: #58a6ff; color: #58a6ff; }
    .fh-pill.downloading { border-color: #3fb950; color: #3fb950; }
    .fh-pill.done { border-color: #1a3a2a; color: #484f58; }
    .fh-pill.failed { border-color: #f85149; color: #f85149; }
  </style>
</head>
<body>

<div class="toolbar">
  <span class="brand">⬡ CyberSeed</span>
  <a href="/">← Downloads</a>
  <a href="/files">📁 Files</a>
  <span class="active-page">🌐 Browser Uploads</span>
  <span class="spacer"></span>
  <a id="browserLink" class="open-btn" href="#" target="_blank">🌐 Open Browser ↗</a>
  <form method="POST" action="/logout" style="display:inline">
    <button type="submit">logout</button>
  </form>
</div>

<div class="layout">
  <!-- FapHouse URL input -->
  <div class="fh-section">
    <h3>🎬 FapHouse Queue</h3>
    <div class="fh-row">
      <textarea id="fhUrls" placeholder="Paste faphouse.com video URLs here (one per line)..."></textarea>
      <button class="fh-btn" id="fhSubmit" onclick="submitFhUrls()">Queue Downloads</button>
    </div>
    <div class="fh-queue-bar" id="fhQueueBar"></div>
  </div>

  <div class="panel-header">
    <span>📥 Downloads</span>
    <button onclick="clearDone()">clear done</button>
  </div>
  <div class="jobs-list" id="jobsList">
    <div class="empty-state" id="emptyState">
      No uploads yet.<br>
      In the browser, save downloads to <strong>/downloads/browser</strong><br>
      and they will appear here automatically.<br><br>
      <a id="emptyBrowserLink" href="#" target="_blank">🌐 Open Virtual Browser ↗</a>
    </div>
  </div>
  <div class="log-pane">
    <div class="log-pane-header" id="logPaneHeader">— select a job to view log —</div>
    <div class="log-content" id="logContent"></div>
  </div>
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
  const url = 'http://' + window.location.hostname + ':3456/';
  document.getElementById('browserLink').href = url;
  document.getElementById('emptyBrowserLink').href = url;
  loadJobs();
  loadFhQueue();
  setInterval(loadJobs, 5000);
  setInterval(loadFhQueue, 5000);
});

let selectedJobId = null;
let logEventSource = null;
let autoScroll = true;

function formatTime(iso) {
  if (!iso) return '';
  try { return new Date(iso + 'Z').toLocaleTimeString(); } catch { return iso; }
}

function badgeHtml(status) {
  return `<span class="badge badge-${status}">${status}</span>`;
}

async function loadJobs() {
  let jobs;
  try {
    const r = await fetch('/api/jobs');
    jobs = await r.json();
  } catch { return; }

  // Only browser + faphouse source jobs
  const browserJobs = jobs.filter(j => ['browser','faphouse'].includes(j.source))
                          .sort((a, b) => (b.started_at || '').localeCompare(a.started_at || ''));

  const list = document.getElementById('jobsList');
  document.getElementById('emptyState').style.display = browserJobs.length ? 'none' : '';

  // Build cards
  const existing = {};
  list.querySelectorAll('.job-card').forEach(el => existing[el.dataset.id] = el);

  browserJobs.forEach(job => {
    let card = existing[job.id];
    if (!card) {
      card = document.createElement('div');
      card.className = 'job-card' + (job.id === selectedJobId ? ' selected' : '');
      card.dataset.id = job.id;
      card.onclick = () => selectJob(job.id, job.name);
      list.appendChild(card);
    }
    card.innerHTML = `
      <div class="job-name" title="${job.name}">${job.name}</div>
      <div class="job-meta">${badgeHtml(job.status)}<span>${formatTime(job.started_at)}</span></div>
    `;
    delete existing[job.id];
  });

  // Remove stale cards
  Object.values(existing).forEach(el => el.remove());

  // If selected job just finished, refresh log once more
  if (selectedJobId) {
    const sel = browserJobs.find(j => j.id === selectedJobId);
    if (sel && ['done','failed'].includes(sel.status) && logEventSource) {
      // SSE will send [DONE] itself, nothing to do
    }
  }
}

function selectJob(jobId, name) {
  selectedJobId = jobId;
  document.querySelectorAll('.job-card').forEach(el => {
    el.classList.toggle('selected', el.dataset.id === jobId);
  });
  document.getElementById('logPaneHeader').textContent = name;
  document.getElementById('logContent').innerHTML = '';

  if (logEventSource) { logEventSource.close(); logEventSource = null; }

  const logContent = document.getElementById('logContent');
  logEventSource = new EventSource(`/api/jobs/${jobId}/log`);
  logEventSource.onmessage = (e) => {
    if (e.data === '[DONE]') { logEventSource.close(); logEventSource = null; return; }
    const line = document.createElement('div');
    const text = e.data;
    line.className = text.includes('✓') || text.includes('SUCCESS') ? 'ok'
                   : text.includes('✗') || text.includes('FAIL') || text.includes('ERROR') ? 'err' : '';
    line.textContent = text;
    logContent.appendChild(line);
    if (autoScroll) logContent.scrollTop = logContent.scrollHeight;
  };
}

async function clearDone() {
  await fetch('/api/jobs?mode=finished', { method: 'DELETE' });
  await fetch('/api/faphouse/queue/clear', { method: 'POST' });
  if (document.querySelector('.job-card.selected')?.classList.contains('badge-done')) {
    selectedJobId = null;
    document.getElementById('logContent').innerHTML = '';
    document.getElementById('logPaneHeader').textContent = '— select a job —';
  }
  loadJobs();
  loadFhQueue();
}

// ── FapHouse Queue ────────────────────────────────────
async function submitFhUrls() {
  const textarea = document.getElementById('fhUrls');
  const btn = document.getElementById('fhSubmit');
  const urls = textarea.value.trim();
  if (!urls) return;
  btn.disabled = true;
  btn.textContent = 'Queueing...';
  try {
    const r = await fetch('/api/faphouse/queue', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ urls }),
    });
    const data = await r.json();
    if (data.error) { alert(data.error); return; }
    textarea.value = '';
    loadFhQueue();
  } catch (e) { alert('Error: ' + e); }
  finally { btn.disabled = false; btn.textContent = 'Queue Downloads'; }
}

async function loadFhQueue() {
  let items;
  try {
    const r = await fetch('/api/faphouse/queue/all');
    items = await r.json();
  } catch { return; }

  const bar = document.getElementById('fhQueueBar');
  bar.innerHTML = '';
  // Show most recent first, limit to 30
  items.slice().reverse().slice(0, 30).forEach(item => {
    const pill = document.createElement('span');
    pill.className = 'fh-pill ' + item.status;
    const label = item.title || item.url.split('/').pop() || item.url;
    pill.textContent = `[${item.status}] ${label}`;
    pill.title = item.url + (item.error ? '\n\nError: ' + item.error : '');
    bar.appendChild(pill);
  });
}
</script>
</body>
</html>
