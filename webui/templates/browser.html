<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberSeed — Browser</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #c9d1d9; font-family: 'Cascadia Code','Fira Code',monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .toolbar { background: #161b22; border-bottom: 1px solid #30363d; padding: .35rem .8rem; display: flex; gap: .5rem; align-items: center; flex-shrink: 0; }
    .toolbar a, .toolbar button { font-size: .75rem; padding: .2rem .5rem; border-radius: 4px; text-decoration: none; border: 1px solid #30363d; background: transparent; color: #8b949e; cursor: pointer; white-space: nowrap; }
    .toolbar a:hover, .toolbar button:hover { color: #c9d1d9; border-color: #8b949e; }
    .toolbar .brand { color: #0dcaf0; font-weight: 700; letter-spacing: 2px; border: none; font-size: .85rem; }
    .toolbar .active-page { color: #ffc107; border: none; font-size: .8rem; }
    .toolbar .spacer { flex: 1; }
    .toolbar .note { font-size: .65rem; color: #238636; border: 1px solid #238636; padding: .15rem .4rem; border-radius: 3px; }
    #browser-frame { flex: 1; border: none; width: 100%; background: #000; }
  </style>
</head>
<body>

<div class="toolbar">
  <span class="brand">⬡ CyberSeed</span>
  <a href="/">← Downloads</a>
  <a href="/files">📁 Files</a>
  <span class="active-page">🌐 Browser</span>
  <span class="spacer"></span>
  <span class="note">↓ Downloads auto-upload to OneDrive/WebDownloads</span>
  <form method="POST" action="/logout" style="display:inline">
    <button type="submit">logout</button>
  </form>
</div>

<iframe id="browser-frame" allowfullscreen></iframe>

<script>
// Full virtual Chromium browser on port 3456
// KasmVNC requires HTTPS — always use https:// regardless of parent protocol
const host = window.location.hostname;
document.getElementById('browser-frame').src = 'https://' + host + ':3456/';
</script>
</body>
</html>
