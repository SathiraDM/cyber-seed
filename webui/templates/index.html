<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberSeed</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --accent: #0dcaf0; }
    body { background: #0d1117; color: #c9d1d9; font-family: 'Cascadia Code', 'Fira Code', monospace; }
    .navbar-brand { color: var(--accent) !important; font-weight: 700; letter-spacing: 2px; }
    .card { background: #161b22; border: 1px solid #30363d; }
    .card-header { background: #21262d; border-bottom: 1px solid #30363d; }
    .log-box {
      background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
      height: 320px; overflow-y: auto; padding: 10px;
      font-size: .78rem; white-space: pre-wrap; word-break: break-all;
      color: #8b949e;
    }
    .log-box .log-line { line-height: 1.6; }
    .badge-queued  { background: #6e7681 !important; }
    .badge-running { background: #d29922 !important; animation: pulse 1.2s infinite; }
    .badge-done    { background: #238636 !important; }
    .badge-failed  { background: #da3633 !important; }
    .badge-cancelled { background: #6e7681 !important; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }
    /* Source badges */
    .src-youtube  { background: #ff0000 !important; color: #fff !important; }
    .src-facebook { background: #1877f2 !important; color: #fff !important; }
    .src-direct   { background: #3d444d !important; color: #c9d1d9 !important; }
    .src-vimeo    { background: #19b7ea !important; color: #fff !important; }
    .src-twitter  { background: #1d9bf0 !important; color: #fff !important; }
    .src-instagram{ background: #c13584 !important; color: #fff !important; }
    .src-tiktok   { background: #010101 !important; color: #fff !important; border: 1px solid #444 !important; }
    .src-twitch        { background: #9146ff !important; color: #fff !important; }
    .src-noodlemagazine { background: #c0392b !important; color: #fff !important; }
    .src-auto           { background: #21262d !important; color: #8b949e !important; border: 1px solid #30363d !important; }
    /* Source pill in form */
    #source-pill { transition: all .2s; }
    #quality-wrap { transition: opacity .2s; }
    .job-row { cursor: pointer; transition: background .15s; }
    .job-row:hover { background: #21262d; }
    .job-row.active-row { background: #1c2128; border-left: 3px solid var(--accent); }
    #url-submit-form textarea:focus, #url-submit-form input:focus { border-color: var(--accent); box-shadow: none; }
    .spinner-xs { width: 12px; height: 12px; border-width: 2px; }
    h6.section-label { font-size: .65rem; text-transform: uppercase; letter-spacing: 1.5px; color: #6e7681; }
    #active-log-header { font-size: .8rem; color: var(--accent); word-break: break-all; }
    .url-col { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark border-bottom border-secondary mb-4">
  <div class="container-fluid px-4">
    <span class="navbar-brand">⬡ CyberSeed</span>
    <div class="d-flex align-items-center gap-3">
      <a href="/files" class="btn btn-sm btn-outline-info py-0 px-2" style="font-size:.75rem">📁 Files</a>
      <a href="/browser" class="btn btn-sm btn-outline-warning py-0 px-2" style="font-size:.75rem">🌐 Browser</a>
      <span class="text-secondary" style="font-size:.8rem" id="docker-status">connecting…</span>
      <form method="POST" action="/logout" class="mb-0">
        <button type="submit" class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size:.75rem">logout</button>
      </form>
    </div>
  </div>
</nav>

<div class="container-fluid px-4">
  <div class="row g-4">

    <!-- ── Left: Submit ──────────────────────────── -->
    <div class="col-lg-4">
      <div class="card mb-4">
        <div class="card-header"><h6 class="section-label mb-0">Submit Download</h6></div>
        <div class="card-body">
          <form id="url-submit-form">
            <div class="mb-3">
              <label class="form-label small text-secondary d-flex justify-content-between align-items-center">
                <span>URL(s) <span class="text-muted">(one per line)</span></span>
                <span id="source-pill" class="badge src-auto">auto-detect</span>
              </label>
              <textarea id="input-urls" class="form-control bg-dark text-light border-secondary" rows="5"
                placeholder="https://youtube.com/watch?v=&#8230;&#10;https://facebook.com/watch?v=&#8230;&#10;https://example.com/file.zip myname"></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label small text-secondary">Source <span class="text-muted">(provider to use)</span></label>
              <select id="input-source" class="form-select bg-dark text-light border-secondary">
                <option value="auto" selected>&#128269; Auto-detect from URL</option>
                <option value="youtube">&#9654; YouTube (yt-dlp)</option>
                <option value="facebook">&#11035; Facebook (yt-dlp)</option>
                <option value="vimeo">&#9673; Vimeo (yt-dlp)</option>
                <option value="twitter">&#10005; Twitter / X (yt-dlp)</option>
                <option value="instagram">&#9672; Instagram (yt-dlp)</option>
                <option value="tiktok">&#9834; TikTok (yt-dlp)</option>
                <option value="twitch">&#9673; Twitch (yt-dlp)</option>
                <option value="noodlemagazine">&#9679; NoodleMagazine (yt-dlp)</option>
                <option value="direct">&#11015; Direct link (aria2c)</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label small text-secondary">Default name <span class="text-muted">(optional)</span></label>
              <input id="input-name" type="text" class="form-control bg-dark text-light border-secondary"
                placeholder="e.g. my-video">
            </div>
            <div class="mb-3" id="quality-wrap">
              <label class="form-label small text-secondary">Quality <span class="text-muted">(YouTube / yt-dlp)</span></label>
              <select id="input-format" class="form-select bg-dark text-light border-secondary">
                <option value="best" selected>Best available (default)</option>
                <option value="2160p">4K — 2160p</option>
                <option value="1080p">Full HD — 1080p</option>
                <option value="720p">HD — 720p</option>
                <option value="480p">SD — 480p</option>
                <option value="360p">Low — 360p</option>
                <option value="audio">Audio only — MP3</option>
              </select>
            </div>
            <button type="submit" class="btn btn-info w-100 fw-bold">
              <span id="submit-spinner" class="spinner-border spinner-xs me-2 d-none" role="status"></span>
              Dispatch
            </button>
          </form>
          <div id="submit-msg" class="mt-2 small"></div>
        </div>
      </div>

      <!-- Stats mini card -->
      <div class="card">
        <div class="card-body py-2 px-3">
          <div class="row text-center g-0" id="stats-row">
            <div class="col"><div class="fw-bold" id="stat-running">—</div><div class="text-secondary" style="font-size:.7rem">running</div></div>
            <div class="col"><div class="fw-bold text-success" id="stat-done">—</div><div class="text-secondary" style="font-size:.7rem">done</div></div>
            <div class="col"><div class="fw-bold text-danger" id="stat-failed">—</div><div class="text-secondary" style="font-size:.7rem">failed</div></div>
            <div class="col"><div class="fw-bold text-secondary" id="stat-total">—</div><div class="text-secondary" style="font-size:.7rem">total</div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Right: Jobs + Log ─────────────────────── -->
    <div class="col-lg-8">
      <!-- Job table -->
      <div class="card mb-3">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h6 class="section-label mb-0">Jobs</h6>
          <div class="d-flex gap-2">
            <button class="btn btn-sm btn-outline-secondary py-0 px-2" onclick="loadJobs()">↻</button>
            <button class="btn btn-sm btn-outline-secondary py-0 px-2" onclick="clearJobs('finished')" title="Remove done/failed/cancelled jobs">Clear finished</button>
            <button class="btn btn-sm btn-outline-danger py-0 px-2" onclick="clearJobs('all')" title="Remove all jobs">Clear all</button>
          </div>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-dark table-hover mb-0" style="font-size:.8rem">
              <thead class="text-secondary">
                <tr>
                  <th class="ps-3">ID</th>
                  <th>Source</th>
                  <th>URL / Name</th>
                  <th>Quality</th>
                  <th>Status</th>
                  <th>Started</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="job-tbody">
                <tr><td colspan="7" class="text-center text-secondary py-4">No jobs yet</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Live log viewer -->
      <div class="card" id="log-card" style="display:none">
        <div class="card-header d-flex justify-content-between align-items-center">
          <div>
            <h6 class="section-label mb-0 d-inline">Live Log</h6>
            <span id="active-log-header" class="ms-2"></span>
          </div>
          <button class="btn btn-sm btn-outline-secondary py-0 px-2" onclick="closeLog()">✕</button>
        </div>
        <div class="card-body p-2">
          <div class="log-box" id="log-box"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
let activeJobId = null;
let activeEvtSrc = null;

// ─ Source detection (mirrors app.py) ─────────────────
const SOURCE_PATTERNS = [
  { key: "youtube",   re: /youtube\.com|youtu\.be/i,               label: "▶ YouTube" },
  { key: "facebook",  re: /facebook\.com|fb\.watch|fb\.com/i,      label: "⬛ Facebook" },
  { key: "vimeo",     re: /vimeo\.com/i,                            label: "◉ Vimeo" },
  { key: "twitter",   re: /twitter\.com|x\.com/i,                  label: "✕ X (Twitter)" },
  { key: "instagram", re: /instagram\.com/i,                        label: "◈ Instagram" },
  { key: "tiktok",    re: /tiktok\.com/i,                          label: "♪ TikTok" },
  { key: "twitch",        re: /twitch\.tv/i,                          label: "◉ Twitch" },
  { key: "noodlemagazine", re: /noodlemagazine\.com/i,                 label: "● NoodleMagazine" },
];

const SOURCE_LABELS = {
  youtube:   "▶ YouTube",
  facebook:  "⬛ Facebook",
  vimeo:     "◉ Vimeo",
  twitter:   "✕ Twitter/X",
  instagram: "◈ Instagram",
  tiktok:    "♪ TikTok",
  twitch:         "◉ Twitch",
  noodlemagazine: "● NoodleMagazine",
  direct:         "⬇ Direct",
};

function detectSource(url) {
  for (const p of SOURCE_PATTERNS) {
    if (p.re.test(url)) return p.key;
  }
  return "direct";
}

// direct links don't benefit from quality selection
const QUALITY_SOURCES = new Set(["youtube","facebook","vimeo","twitter","instagram","tiktok","twitch","noodlemagazine"]);

function updateFormForSource(src) {
  const pill  = document.getElementById("source-pill");
  const qwrap = document.getElementById("quality-wrap");
  const effectiveSrc = src === "auto" ? "auto" : src;
  pill.className   = `badge src-${effectiveSrc}`;
  pill.textContent = effectiveSrc === "auto" ? "auto-detect" : (SOURCE_LABELS[effectiveSrc] || effectiveSrc);
  const isVideo = QUALITY_SOURCES.has(src);
  qwrap.style.opacity      = isVideo ? "1" : "0.35";
  qwrap.style.pointerEvents = isVideo ? "auto" : "none";
  if (!isVideo) document.getElementById("input-format").value = "best";
}

// source select drives the quality hint too
document.getElementById("input-source").addEventListener("change", e => {
  const src = e.target.value;
  if (src === "auto") {
    // re-derive from URL
    const firstUrl = document.getElementById("input-urls").value.trim().split("\n")[0].trim().split(/\s+/)[0];
    updateFormForSource(firstUrl ? detectSource(firstUrl) : "auto");
  } else {
    updateFormForSource(src);
  }
});

document.getElementById("input-urls").addEventListener("input", e => {
  // only update the pill if source dropdown is on auto
  if (document.getElementById("input-source").value !== "auto") return;
  const firstUrl = e.target.value.trim().split("\n")[0].trim().split(/\s+/)[0];
  updateFormForSource(firstUrl ? detectSource(firstUrl) : "auto");
});

// ─ Submit ────────────────────────────────────────────
document.getElementById("url-submit-form").addEventListener("submit", async e => {
  e.preventDefault();
  const urls   = document.getElementById("input-urls").value.trim();
  const name   = document.getElementById("input-name").value.trim();
  const format = document.getElementById("input-format").value;
  const source = document.getElementById("input-source").value;
  if (!urls) return;

  const spinner = document.getElementById("submit-spinner");
  const msg     = document.getElementById("submit-msg");
  spinner.classList.remove("d-none");
  msg.innerHTML = "";

  try {
    const r = await fetch("/api/submit", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ urls, name, format, source })
    });
    const data = await r.json();
    if (r.ok) {
        msg.innerHTML = `<span class="text-info">✓ Submitted ${data.submitted} job(s)</span>`;
        document.getElementById("input-urls").value = "";
        document.getElementById("input-name").value = "";
        document.getElementById("input-format").value = "best";
        document.getElementById("input-source").value = "auto";
        updateFormForSource("auto");
        loadJobs();
        if (data.jobs?.length) openLog(data.jobs[0].id, data.jobs[0].url);
    } else {
      msg.innerHTML = `<span class="text-danger">✗ ${data.error}</span>`;
    }
  } catch(err) {
    msg.innerHTML = `<span class="text-danger">✗ ${err}</span>`;
  } finally {
    spinner.classList.add("d-none");
  }
});

// ─ Jobs ──────────────────────────────────────────────
async function loadJobs() {
  try {
    const r = await fetch("/api/jobs");
    if (!r.ok) return;
    const jobs = await r.json();
    renderJobs(jobs);
    updateStats(jobs);
    document.getElementById("docker-status").textContent = "● Connected";
    document.getElementById("docker-status").className = "text-success";
  } catch {
    document.getElementById("docker-status").textContent = "● Error";
    document.getElementById("docker-status").className = "text-danger";
  }
}

function renderJobs(jobs) {
  const tbody = document.getElementById("job-tbody");
  if (!jobs.length) {
    tbody.innerHTML = `<tr><td colspan="7" class="text-center text-secondary py-4">No jobs yet</td></tr>`;
    return;
  }
  tbody.innerHTML = jobs.map(j => {
    const label    = j.name || j.url;
  // Fix source: if stored as "auto" or missing, re-detect from URL on the fly
  const rawSrc  = j.source && j.source !== "auto" ? j.source : detectSource(j.url || "");
  const src      = rawSrc || "direct";
  const srcBadge = `<span class="badge src-${src}">${SOURCE_LABELS[src] || src}</span>`;
  const badge    = `<span class="badge badge-${j.status}">${j.status}</span>`;
    const fmtLabel = (j.format && j.format !== "best")
      ? `<span class="badge bg-secondary">${j.format}</span>`
      : `<span class="text-secondary" style="font-size:.7rem">best</span>`;
    const ts       = j.started_at ? j.started_at.replace("T"," ").slice(0,19) : "—";
    const isActive = ["queued","running"].includes(j.status);
    const actionBtn = isActive
      ? `<button class="btn btn-sm btn-outline-danger py-0 px-1" onclick="cancelJob('${j.id}',event)" title="Cancel">✕</button>`
      : `<button class="btn btn-sm btn-outline-secondary py-0 px-1" onclick="deleteJob('${j.id}',event)" title="Remove from history">🗑</button>`;
    const active   = j.id === activeJobId ? "active-row" : "";
    return `<tr class="job-row ${active}" onclick="openLog('${j.id}','${escHtml(label)}')">
      <td class="ps-3 text-secondary">${j.id}</td>
      <td>${srcBadge}</td>
      <td class="url-col" title="${escHtml(j.url)}">${escHtml(label)}</td>
      <td>${fmtLabel}</td>
      <td>${badge}</td>
      <td class="text-secondary">${ts}</td>
      <td>${actionBtn}</td>
    </tr>`;
  }).join("");
}

function updateStats(jobs) {
  document.getElementById("stat-running").textContent = jobs.filter(j=>j.status==="running").length;
  document.getElementById("stat-done").textContent    = jobs.filter(j=>j.status==="done").length;
  document.getElementById("stat-failed").textContent  = jobs.filter(j=>j.status==="failed").length;
  document.getElementById("stat-total").textContent   = jobs.length;
}

// ─ Cancel ────────────────────────────────────────────
async function cancelJob(id, e) {
  e.stopPropagation();
  await fetch(`/api/jobs/${id}/cancel`, {method:"POST"});
  loadJobs();
}

// ─ Delete single job ─────────────────────────────────
async function deleteJob(id, e) {
  e.stopPropagation();
  if (id === activeJobId) closeLog();
  await fetch(`/api/jobs/${id}`, {method:"DELETE"});
  loadJobs();
}

// ─ Clear all / finished ──────────────────────────────
async function clearJobs(mode) {
  if (mode === "all" && !confirm("Remove ALL jobs from history?")) return;
  if (activeJobId) closeLog();
  await fetch(`/api/jobs?mode=${mode}`, {method:"DELETE"});
  loadJobs();
}

// ─ Log viewer ────────────────────────────────────────
function openLog(jobId, label) {
  if (activeEvtSrc) { activeEvtSrc.close(); activeEvtSrc = null; }
  activeJobId = jobId;

  document.getElementById("log-card").style.display = "";
  document.getElementById("active-log-header").textContent = label;
  const box = document.getElementById("log-box");
  box.innerHTML = "";

  const es = new EventSource(`/api/jobs/${jobId}/log`);
  activeEvtSrc = es;

  es.onmessage = ev => {
    if (ev.data === "[DONE]") { es.close(); loadJobs(); return; }
    const line = document.createElement("div");
    line.className = "log-line";
    line.textContent = ev.data;
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
  };

  es.onerror = () => { es.close(); };
  loadJobs(); // refresh row highlight
}

function closeLog() {
  if (activeEvtSrc) { activeEvtSrc.close(); activeEvtSrc = null; }
  activeJobId = null;
  document.getElementById("log-card").style.display = "none";
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ─ Auto-refresh every 3 s ────────────────────────────
loadJobs();
setInterval(loadJobs, 3000);
</script>
</body>
</html>
