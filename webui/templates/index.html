<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberSeed</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{cs:{bg:'#0f1117',card:'#161920',border:'#2a2d38',accent:'#6366f1',green:'#22c55e',red:'#ef4444',yellow:'#eab308',blue:'#3b82f6'}}}}}</script>
  <style>
    body{background:#0f1117;color:#e2e8f0;font-family:Inter,system-ui,sans-serif}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#161920}::-webkit-scrollbar-thumb{background:#3a3d48;border-radius:3px}
    .progress-bar{transition:width .5s ease-in-out}
    .tab-btn.active{color:#6366f1;border-bottom:2px solid #6366f1}
    .glass{background:rgba(22,25,32,.8);backdrop-filter:blur(12px)}
    textarea{field-sizing:content;min-height:2.5rem}
    .badge{font-size:.65rem;padding:2px 8px;border-radius:9999px;font-weight:600;text-transform:uppercase}
    .badge-queued,.badge-pending{background:#374151;color:#9ca3af}
    .badge-running,.badge-downloading{background:#1e3a5f;color:#60a5fa}
    .badge-uploading{background:#14403a;color:#34d399}
    .badge-processing{background:#3b2f6b;color:#a78bfa}
    .badge-done{background:#14532d;color:#4ade80}
    .badge-failed{background:#7f1d1d;color:#fca5a5}
    .badge-cancelled{background:#44403c;color:#a8a29e}
    .fade-in{animation:fadeIn .3s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  </style>
</head>
<body class="min-h-screen">

<!-- Top bar -->
<header class="sticky top-0 z-50 glass border-b border-cs-border px-4 py-3 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <h1 class="text-xl font-bold text-white tracking-tight">&olarr; CyberSeed</h1>
    <span class="text-xs text-gray-500">download &amp; upload engine</span>
  </div>
  <div class="flex items-center gap-2">
    <a href="" id="link-qbt" target="_blank" class="text-xs px-3 py-1.5 bg-cs-card border border-cs-border rounded-lg hover:bg-cs-border transition" title="qBittorrent">&#x1F30A; qBit</a>
    <a href="" id="link-mon" target="_blank" class="text-xs px-3 py-1.5 bg-cs-card border border-cs-border rounded-lg hover:bg-cs-border transition" title="System Monitor">&#x1F4CA; Monitor</a>
    <a href="" id="link-files" target="_blank" class="text-xs px-3 py-1.5 bg-cs-card border border-cs-border rounded-lg hover:bg-cs-border transition" title="File Browser">&#x1F4C1; Files</a>
    <a href="" id="link-browser" target="_blank" class="text-xs px-3 py-1.5 bg-cs-card border border-cs-border rounded-lg hover:bg-cs-border transition" title="Virtual Browser">&#x1F5A5; Browser</a>
    <form action="/logout" method="post" class="inline">
      <button class="text-xs px-3 py-1.5 bg-red-900/30 border border-red-800/50 rounded-lg hover:bg-red-900/50 text-red-300 transition">Logout</button>
    </form>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-6 space-y-6">

  <!-- Source tabs -->
  <nav class="flex gap-1 border-b border-cs-border overflow-x-auto" id="sourceTabs">
    <button class="tab-btn active px-4 py-2.5 text-sm font-medium text-gray-400 hover:text-white transition whitespace-nowrap" data-source="all">All</button>
    <button class="tab-btn px-4 py-2.5 text-sm font-medium text-gray-400 hover:text-white transition whitespace-nowrap" data-source="yt">YouTube</button>
    <button class="tab-btn px-4 py-2.5 text-sm font-medium text-gray-400 hover:text-white transition whitespace-nowrap" data-source="nm">NM</button>
    <button class="tab-btn px-4 py-2.5 text-sm font-medium text-gray-400 hover:text-white transition whitespace-nowrap" data-source="fh">FH</button>
    <button class="tab-btn px-4 py-2.5 text-sm font-medium text-gray-400 hover:text-white transition whitespace-nowrap" data-source="direct">Direct</button>
  </nav>

  <!-- Submit form -->
  <section id="submitSection" class="bg-cs-card border border-cs-border rounded-xl p-5 fade-in">
    <div class="flex gap-4">
      <div class="flex-1 space-y-3">
        <textarea id="urlInput" rows="1" placeholder="Paste URL(s) - one per line for bulk downloads"
          class="w-full bg-cs-bg border border-cs-border rounded-lg px-4 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-cs-accent resize-y"></textarea>
        <div class="flex gap-3 items-center flex-wrap">
          <select id="fmtSelect" class="bg-cs-bg border border-cs-border rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-cs-accent">
            <option value="best">Best quality</option>
            <option value="1080">1080p</option>
            <option value="720">720p</option>
            <option value="480">480p</option>
            <option value="audio">Audio only</option>
          </select>
          <input id="nameInput" type="text" placeholder="Custom filename (optional)"
            class="flex-1 bg-cs-bg border border-cs-border rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-cs-accent">
          <button id="submitBtn" onclick="submitUrls()"
            class="px-6 py-2 bg-cs-accent hover:bg-indigo-600 text-white text-sm font-medium rounded-lg transition flex items-center gap-2">
            <span>&#x2B07;</span> Download
          </button>
        </div>
      </div>
    </div>
    <!-- Duplicate warning -->
    <div id="dupeWarning" class="hidden mt-4 bg-yellow-900/20 border border-yellow-700/50 rounded-lg p-4">
      <div class="flex items-start gap-3">
        <span class="text-yellow-400 text-lg">&#x26A0;</span>
        <div class="flex-1">
          <p class="text-yellow-300 text-sm font-medium">Duplicate URLs detected</p>
          <p id="dupeMessage" class="text-yellow-400/70 text-xs mt-1"></p>
          <ul id="dupeList" class="mt-2 text-xs text-yellow-500/80 space-y-1 max-h-32 overflow-y-auto"></ul>
          <div class="mt-3 flex gap-2">
            <button onclick="submitUrls(true)" class="px-4 py-1.5 bg-yellow-700/40 hover:bg-yellow-700/60 text-yellow-200 text-xs rounded-lg transition">Download Anyway</button>
            <button onclick="hideDupeWarning()" class="px-4 py-1.5 bg-cs-card border border-cs-border text-gray-400 text-xs rounded-lg hover:bg-cs-border transition">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Stats bar -->
  <div id="statsBar" class="flex gap-3 flex-wrap text-xs">
    <span class="px-3 py-1.5 bg-cs-card border border-cs-border rounded-lg">Total: <b id="statTotal" class="text-white">0</b></span>
    <span class="px-3 py-1.5 bg-cs-card border border-cs-border rounded-lg">Running: <b id="statRunning" class="text-blue-400">0</b></span>
    <span class="px-3 py-1.5 bg-cs-card border border-cs-border rounded-lg">Done: <b id="statDone" class="text-green-400">0</b></span>
    <span class="px-3 py-1.5 bg-cs-card border border-cs-border rounded-lg">Failed: <b id="statFailed" class="text-red-400">0</b></span>
    <div class="flex-1"></div>
    <select id="statusFilter" class="bg-cs-card border border-cs-border rounded-lg px-3 py-1.5 text-xs text-gray-300 focus:outline-none focus:border-cs-accent" onchange="loadJobs()">
      <option value="all">All statuses</option>
      <option value="queued">Queued</option>
      <option value="pending">Pending</option>
      <option value="running">Running</option>
      <option value="downloading">Downloading</option>
      <option value="done">Done</option>
      <option value="failed">Failed</option>
    </select>
    <input id="searchInput" type="text" placeholder="Search..."
      class="bg-cs-card border border-cs-border rounded-lg px-3 py-1.5 text-xs text-white placeholder-gray-500 focus:outline-none focus:border-cs-accent w-48">
    <button onclick="clearFinished()" class="px-3 py-1.5 bg-cs-card border border-cs-border rounded-lg text-gray-400 hover:text-red-400 hover:border-red-800 transition text-xs">&#x1F5D1; Clear finished</button>
  </div>

  <!-- Job cards -->
  <div id="jobsList" class="space-y-2"></div>

  <!-- Pagination -->
  <div id="pagination" class="flex items-center justify-center gap-2 text-sm"></div>

  <!-- Empty state -->
  <div id="emptyState" class="hidden text-center py-16 text-gray-600">
    <div class="text-5xl mb-4">&#x1F4ED;</div>
    <p class="text-lg font-medium">No downloads yet</p>
    <p class="text-sm mt-1">Paste a URL above to get started</p>
  </div>

</main>

<!-- Log modal -->
<div id="logModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60 backdrop-filter backdrop-blur-sm" onclick="if(event.target===this)closeLog()">
  <div class="bg-cs-card border border-cs-border rounded-xl w-11/12 max-w-3xl" style="max-height:80vh;display:flex;flex-direction:column">
    <div class="flex items-center justify-between px-5 py-3 border-b border-cs-border">
      <span class="text-sm font-medium text-white" id="logTitle">Job Log</span>
      <button onclick="closeLog()" class="text-gray-500 hover:text-white text-lg">&times;</button>
    </div>
    <pre id="logContent" class="flex-1 overflow-auto p-5 text-xs text-gray-400 font-mono whitespace-pre-wrap"></pre>
  </div>
</div>

<script>
const HOST = location.hostname;
document.getElementById('link-qbt').href = '//' + HOST + ':8080';
document.getElementById('link-mon').href = '//' + HOST + ':61208';
document.getElementById('link-files').href = '//' + HOST + ':8334';
document.getElementById('link-browser').href = '//' + HOST + ':3456';

let currentSource = 'all';
let currentPage = 1;
const PER_PAGE = 20;
let searchTimer;

document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(loadJobs, 400);
});

// ── Tabs ──
document.querySelectorAll('.tab-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    currentSource = btn.dataset.source;
    currentPage = 1;

    document.getElementById('emptyState').classList.add('hidden');

    var fmtSel = document.getElementById('fmtSelect');
    var nameSel = document.getElementById('nameInput');
    if (currentSource === 'fh') {
      fmtSel.classList.add('hidden');
      nameSel.classList.add('hidden');
      document.getElementById('urlInput').placeholder = 'Paste FH URL(s) - one per line';
    } else {
      fmtSel.classList.remove('hidden');
      nameSel.classList.remove('hidden');
      document.getElementById('urlInput').placeholder = 'Paste URL(s) - one per line for bulk downloads';
    }

    loadJobs();
  });
});

// ── Submit ──
function submitUrls(force) {
  var urls = document.getElementById('urlInput').value.trim();
  if (!urls) return;
  var isFH = (currentSource === 'fh');
  var endpoint = isFH ? '/api/faphouse/queue' : '/api/submit';
  var body;
  if (isFH) {
    body = { urls: urls, force: !!force };
  } else {
    body = { urls: urls, name: document.getElementById('nameInput').value,
             format: document.getElementById('fmtSelect').value,
             source: (currentSource === 'all' ? 'auto' : currentSource), force: !!force };
  }
  fetch(endpoint, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  }).then(function(res) {
    if (res.status === 409) {
      res.json().then(showDupeWarning);
      return;
    }
    if (res.ok) {
      document.getElementById('urlInput').value = '';
      hideDupeWarning();
      loadJobs();
    }
  });
}

function showDupeWarning(data) {
  document.getElementById('dupeWarning').classList.remove('hidden');
  document.getElementById('dupeMessage').textContent = data.duplicates.length + ' of ' + data.total + ' URL(s) already downloaded or in progress.';
  document.getElementById('dupeList').innerHTML = data.duplicates.map(function(u) { return '<li class="truncate">&#x2022; ' + u + '</li>'; }).join('');
}

function hideDupeWarning() {
  document.getElementById('dupeWarning').classList.add('hidden');
}

// ── Load jobs ──
function loadJobs() {
  var status = document.getElementById('statusFilter').value;
  var search = document.getElementById('searchInput').value;
  var src = currentSource;
  var params = 'source=' + src + '&status=' + status + '&page=' + currentPage + '&per_page=' + PER_PAGE + '&search=' + encodeURIComponent(search);
  fetch('/api/jobs?' + params).then(function(r) { return r.json(); }).then(function(data) {
    renderJobs(data.jobs);
    renderPagination(data.page, data.pages, data.total);
    loadStats();
  });
}

function renderJobs(jobs) {
  var el = document.getElementById('jobsList');
  var empty = document.getElementById('emptyState');
  if (!jobs.length) { el.innerHTML = ''; empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');
  el.innerHTML = jobs.map(function(j) {
    var pct = j.download_pct || 0;
    var isUploading = j.status === 'uploading';
    var isActive = ['running','downloading','processing','queued','pending','uploading'].indexOf(j.status) >= 0;
    var title = j.name || j.url;
    var meta = j.metadata || {};
    var srcMap = {yt:'YT',nm:'NM',fh:'FH',direct:'Direct',fb:'FB',vim:'VIM',tw:'TW',ig:'IG',tt:'TT',twi:'TWI'};
    var srcLabel = srcMap[j.source] || j.source.toUpperCase();
    var safeName = (title || '').replace(/'/g, '');
    var html = '<div class="bg-cs-card border border-cs-border rounded-xl p-4 fade-in hover:border-cs-accent/30 transition group">';
    html += '<div class="flex items-start gap-3"><div class="flex-1 min-w-0">';
    html += '<div class="flex items-center gap-2 mb-1">';
    html += '<span class="badge badge-' + j.status + '">' + j.status + '</span>';
    html += '<span class="text-[10px] px-2 py-0.5 bg-cs-border rounded text-gray-400">' + srcLabel + '</span>';
    if (meta.studio) html += '<span class="text-[10px] text-purple-400">' + meta.studio + '</span>';
    html += '</div>';
    html += '<p class="text-sm text-white font-medium truncate" title="' + title + '">' + title + '</p>';
    html += '<p class="text-[11px] text-gray-500 truncate mt-0.5">' + j.url + '</p>';
    if (meta.models && meta.models.length) html += '<p class="text-[10px] text-gray-500 mt-1">&#x1F464; ' + meta.models.join(', ') + '</p>';
    html += '</div>';
    html += '<div class="flex items-center gap-1.5 opacity-0 group-hover:opacity-100 transition">';
    html += '<button onclick="showLog(\'' + j.id + '\',\'' + safeName + '\')" class="p-1.5 rounded-lg hover:bg-cs-border text-gray-500 hover:text-white transition" title="View log">&#x1F4CB;</button>';
    if (j.status === 'done' || j.status === 'failed' || j.status === 'cancelled') {
      html += '<button onclick="deleteJob(\'' + j.id + '\')" class="p-1.5 rounded-lg hover:bg-red-900/30 text-gray-500 hover:text-red-400 transition" title="Delete">&#x1F5D1;</button>';
    } else {
      html += '<button onclick="cancelJob(\'' + j.id + '\')" class="p-1.5 rounded-lg hover:bg-red-900/30 text-gray-500 hover:text-red-400 transition" title="Cancel">&#x23F9;</button>';
    }
    html += '</div></div>';
    if (isActive) {
      var displayPct = isUploading ? (j.upload_pct || 0) : pct;
      var label = isUploading ? '&#x2B06; Uploading' : (j.status === 'downloading' || j.status === 'running' ? '&#x2B07; Downloading' : '&#x23F3; Waiting...');
      var barColor = isUploading ? 'bg-cs-green' : (j.status === 'downloading' || j.status === 'running' ? 'bg-cs-accent' : 'bg-gray-600');
      html += '<div class="mt-3"><div class="flex items-center justify-between text-[11px] text-gray-400 mb-1.5">';
      html += '<span>' + label + '</span>';
      html += '<span>' + displayPct.toFixed(1) + '%';
      if (j.speed) html += ' &#x2022; ' + j.speed;
      if (j.eta) html += ' &#x2022; ETA ' + j.eta;
      if (!isUploading && j.file_size) html += ' &#x2022; ' + j.file_size;
      html += '</span></div>';
      html += '<div class="w-full h-1.5 bg-cs-bg rounded-full overflow-hidden">';
      html += '<div class="progress-bar h-full rounded-full ' + barColor + '" style="width:' + displayPct + '%"></div>';
      html += '</div></div>';
    }
    if (j.error) html += '<p class="text-[11px] text-red-400 mt-2">&#x26A0; ' + j.error + '</p>';
    html += '<div class="flex items-center justify-between mt-2">';
    html += '<span class="text-[10px] text-gray-600">' + j.id + '</span>';
    html += '<span class="text-[10px] text-gray-600">' + new Date(j.created_at).toLocaleString() + '</span>';
    html += '</div></div>';
    return html;
  }).join('');
}

function renderPagination(page, pages, total) {
  var el = document.getElementById('pagination');
  if (pages <= 1) { el.innerHTML = ''; return; }
  var html = '<span class="text-xs text-gray-500">' + total + ' items</span>';
  html += '<button onclick="goPage(' + (page - 1) + ')" class="px-2 py-1 rounded text-xs ' + (page <= 1 ? 'text-gray-700 cursor-not-allowed' : 'text-gray-400 hover:text-white hover:bg-cs-border') + '"' + (page <= 1 ? ' disabled' : '') + '>&laquo;</button>';
  for (var p = Math.max(1, page - 2); p <= Math.min(pages, page + 2); p++) {
    html += '<button onclick="goPage(' + p + ')" class="px-2.5 py-1 rounded text-xs ' + (p === page ? 'bg-cs-accent text-white' : 'text-gray-400 hover:text-white hover:bg-cs-border') + '">' + p + '</button>';
  }
  html += '<button onclick="goPage(' + (page + 1) + ')" class="px-2 py-1 rounded text-xs ' + (page >= pages ? 'text-gray-700 cursor-not-allowed' : 'text-gray-400 hover:text-white hover:bg-cs-border') + '"' + (page >= pages ? ' disabled' : '') + '>&raquo;</button>';
  el.innerHTML = html;
}

function goPage(p) { currentPage = p; loadJobs(); }

// ── Stats ──
function loadStats() {
  var src = (currentSource === 'all') ? '' : currentSource;
  fetch('/api/jobs/stats' + (src ? '?source=' + src : '')).then(function(r) { return r.json(); }).then(function(s) {
    document.getElementById('statTotal').textContent = s.total || 0;
    document.getElementById('statRunning').textContent = (s.running || 0) + (s.downloading || 0) + (s.queued || 0) + (s.pending || 0);
    document.getElementById('statDone').textContent = s.done || 0;
    document.getElementById('statFailed').textContent = s.failed || 0;
  });
}

// ── Actions ──
function cancelJob(id) { fetch('/api/jobs/' + id + '/cancel', {method:'POST'}).then(loadJobs); }
function deleteJob(id) { fetch('/api/jobs/' + id, {method:'DELETE'}).then(loadJobs); }
function clearFinished() {
  var src = (currentSource === 'all') ? '' : '&source=' + currentSource;
  fetch('/api/jobs?mode=finished' + src, {method:'DELETE'}).then(loadJobs);
}

// ── Log modal ──
function showLog(id, title) {
  document.getElementById('logModal').classList.remove('hidden');
  document.getElementById('logModal').style.display = 'flex';
  document.getElementById('logTitle').textContent = title || ('Job ' + id);
  var pre = document.getElementById('logContent');
  pre.textContent = 'Loading...';
  fetch('/api/jobs/' + id + '/log/full').then(function(r) { return r.text(); }).then(function(t) { pre.textContent = t; });
}

function closeLog() {
  document.getElementById('logModal').style.display = 'none';
  document.getElementById('logModal').classList.add('hidden');
}

// ── Polling ──
setInterval(function() {
  if (currentSource !== 'browser') loadJobs();
}, 3000);

// ── Keyboard ──
document.getElementById('urlInput').addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') submitUrls();
});

// Init
loadJobs();
</script>
</body>
</html>
