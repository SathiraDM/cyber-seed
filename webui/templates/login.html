<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberSeed - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{cs:{bg:'#0f1117',card:'#161920',border:'#2a2d38',accent:'#6366f1'}}}}}</script>
  <style>body{background:#0f1117;color:#e2e8f0;font-family:Inter,system-ui,sans-serif}</style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="bg-cs-card border border-cs-border rounded-2xl p-8 w-full max-w-sm shadow-2xl">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-white">&#x26A1; CyberSeed</h1>
      <p class="text-sm text-gray-500 mt-1">Enter password to continue</p>
    </div>
    {% if error %}
    <div class="mb-4 bg-red-900/20 border border-red-800/50 rounded-lg p-3 text-sm text-red-300 text-center">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login" class="space-y-4">
      <input type="password" name="password" autofocus required placeholder="Password"
        class="w-full bg-cs-bg border border-cs-border rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-cs-accent transition">
      <button type="submit"
        class="w-full py-3 bg-cs-accent hover:bg-indigo-600 text-white font-medium rounded-lg transition">
        Sign In
      </button>
    </form>
  </div>
</body>
</html>
