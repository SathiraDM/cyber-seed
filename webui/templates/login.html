<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberSeed — login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
    }
    .brand { color: #0dcaf0; font-size: 1.4rem; font-weight: 700; letter-spacing: 3px; }
    .form-control:focus { border-color: #0dcaf0; box-shadow: none; }
    .btn-login { background: #0dcaf0; color: #0d1117; font-weight: 700; border: none; }
    .btn-login:hover { background: #31d2f2; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="brand">⬡ CyberSeed</div>
      <div class="text-secondary mt-1" style="font-size:.75rem">enter password to continue</div>
    </div>
    {% if error %}
    <div class="alert alert-danger py-2 text-center" style="font-size:.85rem">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/login">
      <div class="mb-3">
        <input type="password" name="password" class="form-control bg-dark text-light border-secondary"
          placeholder="Password" autofocus autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-login w-100">Unlock</button>
    </form>
  </div>
</body>
</html>
