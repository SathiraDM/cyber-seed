<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberSeed — Files</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --accent: #0dcaf0; }
    body { background: #0d1117; color: #c9d1d9; font-family: 'Cascadia Code', 'Fira Code', monospace; }
    .navbar-brand { color: var(--accent) !important; font-weight: 700; letter-spacing: 2px; }
    .card { background: #161b22; border: 1px solid #30363d; }
    .card-header { background: #21262d; border-bottom: 1px solid #30363d; }
    h6.section-label { font-size: .65rem; text-transform: uppercase; letter-spacing: 1.5px; color: #6e7681; }
    .file-row { cursor: pointer; transition: background .15s; }
    .file-row:hover { background: #21262d; }
    .breadcrumb { background: transparent; margin: 0; padding: 0; font-size: .82rem; }
    .breadcrumb-item a { color: var(--accent); text-decoration: none; }
    .breadcrumb-item.active { color: #8b949e; }
    .icon-folder { color: #d29922; }
    .icon-file   { color: #8b949e; }
    .size-col { white-space: nowrap; text-align: right; }
    .date-col { white-space: nowrap; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark border-bottom border-secondary mb-4">
  <div class="container-fluid px-4">
    <div class="d-flex align-items-center gap-3">
      <a href="/" class="navbar-brand mb-0">⬡ CyberSeed</a>
      <a href="/" class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size:.75rem">← Downloads</a>
      <a href="/browser" class="btn btn-sm btn-outline-warning py-0 px-2" style="font-size:.75rem">🌐 Browser</a>
      <span class="text-info" style="font-size:.8rem">Files</span>
    </div>
    <div class="d-flex align-items-center gap-3">
      <form method="POST" action="/logout" class="mb-0">
        <button type="submit" class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size:.75rem">logout</button>
      </form>
    </div>
  </div>
</nav>

<div class="container-fluid px-4">
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <div>
        <h6 class="section-label mb-0 d-inline">File Manager</h6>
        <span class="ms-2 text-secondary" style="font-size:.75rem" id="path-info">/downloads</span>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-secondary py-0 px-2" onclick="navigateTo(currentPath)" title="Refresh">↻</button>
        <button class="btn btn-sm btn-outline-secondary py-0 px-2" id="btn-up" onclick="goUp()" title="Go up">↑ Up</button>
      </div>
    </div>
    <div class="card-body p-0">
      <!-- Breadcrumb -->
      <div class="px-3 py-2 border-bottom border-secondary">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb mb-0" id="breadcrumb"></ol>
        </nav>
      </div>

      <div class="table-responsive">
        <table class="table table-dark table-hover mb-0" style="font-size:.82rem">
          <thead class="text-secondary">
            <tr>
              <th class="ps-3" style="width:40px"></th>
              <th>Name</th>
              <th class="size-col pe-3">Size</th>
              <th class="date-col">Modified</th>
              <th style="width:80px">Actions</th>
            </tr>
          </thead>
          <tbody id="file-tbody">
            <tr><td colspan="5" class="text-center text-secondary py-4">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Delete confirmation modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content bg-dark border-secondary">
      <div class="modal-header border-secondary py-2">
        <h6 class="modal-title" style="font-size:.85rem">Confirm Delete</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body py-2" style="font-size:.82rem">
        Delete <strong id="delete-name"></strong>?
      </div>
      <div class="modal-footer border-secondary py-1">
        <button type="button" class="btn btn-sm btn-secondary py-0" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-sm btn-danger py-0" id="btn-confirm-delete">Delete</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let currentPath = "";

function navigateTo(path) {
  currentPath = path || "";
  fetch(`/api/files?path=${encodeURIComponent(currentPath)}`)
    .then(r => r.json())
    .then(data => {
      if (data.error) { alert(data.error); return; }
      renderBreadcrumb(currentPath);
      renderFiles(data.items);
      document.getElementById("path-info").textContent = "/downloads" + (currentPath ? "/" + currentPath : "");
      document.getElementById("btn-up").disabled = !currentPath;
    })
    .catch(err => console.error(err));
}

function renderBreadcrumb(path) {
  const ol = document.getElementById("breadcrumb");
  const parts = path ? path.split("/").filter(Boolean) : [];
  let html = `<li class="breadcrumb-item"><a href="#" onclick="navigateTo('');return false">downloads</a></li>`;
  let accum = "";
  parts.forEach((p, i) => {
    accum += (accum ? "/" : "") + p;
    if (i === parts.length - 1) {
      html += `<li class="breadcrumb-item active">${escHtml(p)}</li>`;
    } else {
      html += `<li class="breadcrumb-item"><a href="#" onclick="navigateTo('${escHtml(accum)}');return false">${escHtml(p)}</a></li>`;
    }
  });
  ol.innerHTML = html;
}

function renderFiles(items) {
  const tbody = document.getElementById("file-tbody");
  if (!items.length) {
    tbody.innerHTML = `<tr><td colspan="5" class="text-center text-secondary py-4">Empty folder</td></tr>`;
    return;
  }
  tbody.innerHTML = items.map(f => {
    const icon = f.is_dir
      ? `<span class="icon-folder">📁</span>`
      : `<span class="icon-file">📄</span>`;
    const relPath = currentPath ? currentPath + "/" + f.name : f.name;
    const nameCell = f.is_dir
      ? `<a href="#" class="text-light text-decoration-none" onclick="navigateTo('${escAttr(relPath)}');return false">${escHtml(f.name)}</a>`
      : `<span>${escHtml(f.name)}</span>`;
    const dlBtn = f.is_dir ? "" :
      `<a href="/api/files/download?path=${encodeURIComponent(relPath)}" class="btn btn-sm btn-outline-info py-0 px-1" title="Download" onclick="event.stopPropagation()">⬇</a>`;
    const delBtn = `<button class="btn btn-sm btn-outline-danger py-0 px-1" title="Delete" onclick="confirmDelete('${escAttr(relPath)}','${escAttr(f.name)}',event)">🗑</button>`;
    const ts = f.modified ? f.modified.replace("T"," ").slice(0,19) : "—";
    const onclick = f.is_dir ? `onclick="navigateTo('${escAttr(relPath)}')"` : "";
    return `<tr class="file-row" ${onclick}>
      <td class="ps-3 text-center">${icon}</td>
      <td>${nameCell}</td>
      <td class="size-col pe-3 text-secondary">${f.size_human}</td>
      <td class="date-col text-secondary">${ts}</td>
      <td class="text-end">${dlBtn} ${delBtn}</td>
    </tr>`;
  }).join("");
}

let pendingDeletePath = "";
function confirmDelete(path, name, e) {
  e.stopPropagation();
  pendingDeletePath = path;
  document.getElementById("delete-name").textContent = name;
  new bootstrap.Modal(document.getElementById("deleteModal")).show();
}

document.getElementById("btn-confirm-delete").addEventListener("click", async () => {
  if (!pendingDeletePath) return;
  try {
    const r = await fetch("/api/files/delete", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({path: pendingDeletePath})
    });
    const data = await r.json();
    if (!r.ok) alert(data.error || "Delete failed");
  } catch(e) { alert(e); }
  bootstrap.Modal.getInstance(document.getElementById("deleteModal")).hide();
  pendingDeletePath = "";
  navigateTo(currentPath);
});

function goUp() {
  if (!currentPath) return;
  const parts = currentPath.split("/").filter(Boolean);
  parts.pop();
  navigateTo(parts.join("/"));
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function escAttr(s) {
  return String(s).replace(/'/g, "\\'").replace(/"/g, "&quot;");
}

// Initial load
navigateTo("");
</script>
</body>
</html>
